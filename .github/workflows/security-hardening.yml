name: security-hardening

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux-hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install Linux hardening dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io gnome-keyring libsecret-tools dbus-x11

      - name: Start Docker
        run: |
          sudo service docker start
          docker info

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linux OCI sandbox adversarial tests
        run: pnpm --filter @agentgit/execution-adapters test

      - name: Run Linux Secret Service tests
        run: |
          dbus-run-session -- bash -lc '
            eval "$(gnome-keyring-daemon --start --components=secrets)"
            export GNOME_KEYRING_CONTROL GNOME_KEYRING_PID SSH_AUTH_SOCK
            pnpm --filter @agentgit/credential-broker test
          '

  macos-hardening:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run macOS Keychain credential-broker tests
        run: pnpm --filter @agentgit/credential-broker test

      - name: Build and install-smoke the Python SDK package
        run: pnpm py:build

      - name: Verify installed authority CLI smoke path on macOS
        run: pnpm smoke:cli-install

      - name: Verify installed product CLI smoke path on macOS
        run: pnpm smoke:agent-runtime-install
