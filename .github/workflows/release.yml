name: Release Packages

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release candidate
        run: pnpm release:verify

      - name: Pack signed release artifacts
        run: pnpm release:pack -- --signing-mode required
        env:
          AGENTGIT_RELEASE_SIGNING_PRIVATE_KEY_PEM_B64: ${{ secrets.AGENTGIT_RELEASE_SIGNING_PRIVATE_KEY_PEM_B64 }}

      - name: Verify signed release artifacts
        run: node scripts/verify-release-artifacts.mjs --artifacts-dir .release-artifacts/packed --signature-mode required
        env:
          AGENTGIT_RELEASE_SIGNING_PUBLIC_KEY_PEM_B64: ${{ secrets.AGENTGIT_RELEASE_SIGNING_PUBLIC_KEY_PEM_B64 }}

      - name: Create release pull request or publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf
        with:
          version: pnpm version:packages
          publish: pnpm release:publish
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
