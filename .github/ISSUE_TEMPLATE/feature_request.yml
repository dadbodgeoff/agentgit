name: Feature Request
description: Propose a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it. The more context you provide, the easier it is to evaluate and prioritize.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or pain point. What are you trying to do that's currently hard or impossible?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Feel free to sketch API shapes, CLI commands, or config changes.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried working around this? Are there other approaches?

  - type: dropdown
    id: area
    attributes:
      label: Which part of agentgit does this touch?
      multiple: true
      options:
        - Policy engine
        - Snapshots / recovery
        - Journal / audit
        - CLI
        - TypeScript SDK
        - Python SDK
        - MCP integration
        - Inspector UI
        - Daemon / IPC
        - Documentation
        - Other

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this
